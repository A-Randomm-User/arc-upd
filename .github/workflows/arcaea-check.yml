name: Arcaea Update Checker

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Read old version
        id: old
        run: |
          if [ -f version.txt ]; then
            echo "version=$(cat version.txt)" >> $GITHUB_OUTPUT
          else
            echo "version=none" >> $GITHUB_OUTPUT

      - name: Fetch latest version
        id: new
        run: |
          data=$(curl -s https://webapi.lowiro.com/webapi/serve/static/bin/arcaea/apk)

          echo "Raw response:"
          echo "$data"

          # Validate JSON and success=true
          if echo "$data" | jq -e '.success == true' >/dev/null 2>&1; then
            version=$(echo "$data" | jq -r '.value.version')
            url=$(echo "$data" | jq -r '.value.url')
          else
            echo "Invalid JSON or API failure, skipping"
            version="unknown"
            url=""
          fi

          echo "version=$version" >> $GITHUB_OUTPUT
          echo "url=$url" >> $GITHUB_OUTPUT

      - name: Compare and notify
        if: steps.old.outputs.version != steps.new.outputs.version && steps.new.outputs.version != 'unknown'
        env:
          VERSION: ${{ steps.new.outputs.version }}
          URL: ${{ steps.new.outputs.url }}
          SERVERCHAN_KEY: ${{ secrets.SERVERCHAN_KEY }}
        run: |
          echo "New version found"

          title="【更新】Arcaea"

          # Escape > for YAML
          desp="### 检测到新版本: $VERSION\n\n\> **URL**: $URL\n\n检测时间: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')"

          response=$(curl --fail -s -o /dev/null -w "%{http_code}" "https://sctapi.ftqq.com/$SERVERCHAN_KEY.send" \
            -d "title=$title" \
            --data-urlencode "desp=$desp") || true

          if [ "$response" != "200" ]; then
            echo "ServerChan notification failed with HTTP code $response"
          else
            echo "Notification sent successfully"
          fi

          # Save new version
          echo "$VERSION" > version.txt

      - name: Commit new version
        if: steps.old.outputs.version != steps.new.outputs.version
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          CHANGES=$(git status --porcelain)
          if [ -n "$CHANGES" ]; then
            git add version.txt
            git commit -m "Update version to ${{ steps.new.outputs.version }}"
            git push
          else
            echo "No changes to commit"
